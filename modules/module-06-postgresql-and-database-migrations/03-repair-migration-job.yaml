apiVersion: batch/v1
kind: Job
metadata:
  name: db-migration-repair
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migration-repair
          image: localhost:5000/k8s-workshop-migration:repair
          imagePullPolicy: Always
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: flask-app-secret
                  key: DATABASE_URL
