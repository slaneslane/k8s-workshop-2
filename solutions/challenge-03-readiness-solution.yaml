apiVersion: apps/v1
kind: Deployment
metadata:
  name: broken-readiness
spec:
  replicas: 1
  selector:
    matchLabels:
      app: broken-readiness
  template:
    metadata:
      labels:
        app: broken-readiness
    spec:
      containers:
        - name: nginx
          image: nginx:1.27
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            periodSeconds: 5
