apiVersion: apps/v1
kind: Deployment
metadata:
  name: quota-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: quota-demo
  template:
    metadata:
      labels:
        app: quota-demo
    spec:
      containers:
        - name: app
          image: nginx:1.27
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
