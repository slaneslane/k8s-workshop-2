# Use a debug container instead of relying on shell inside the app image:
# kubectl debug -it pod/distroless-demo --image=busybox:1.36 --target=app -- sh
apiVersion: v1
kind: Pod
metadata:
  name: debug-friendly-demo
spec:
  containers:
    - name: app
      image: busybox:1.36
      command: ["sh", "-c", "sleep 3600"]
