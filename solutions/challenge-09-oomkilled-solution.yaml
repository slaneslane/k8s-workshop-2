apiVersion: v1
kind: Pod
metadata:
  name: oom-demo-fixed
spec:
  restartPolicy: Always
  containers:
    - name: stress
      image: python:3.12-slim
      command: ["python", "-c", "import time; print('stable'); time.sleep(3600)"]
      resources:
        limits:
          memory: 128Mi
        requests:
          memory: 64Mi
