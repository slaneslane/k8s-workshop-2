apiVersion: apps/v1
kind: Deployment
metadata:
  name: broken-crashloop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: broken-crashloop
  template:
    metadata:
      labels:
        app: broken-crashloop
    spec:
      containers:
        - name: app
          image: busybox:1.36
          command: ["sh", "-c", "echo starting; exit 1"]
