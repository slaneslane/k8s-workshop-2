apiVersion: apps/v1
kind: Deployment
metadata:
  name: selector-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: selector-app
  template:
    metadata:
      labels:
        app: selector-app
    spec:
      containers:
        - name: nginx
          image: nginx:1.27
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: selector-app
spec:
  selector:
    app: wrong-label
  ports:
    - port: 80
      targetPort: 80
