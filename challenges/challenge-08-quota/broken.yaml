apiVersion: v1
kind: ResourceQuota
metadata:
  name: tiny-quota
spec:
  hard:
    requests.cpu: "200m"
    requests.memory: 256Mi
    pods: "2"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: quota-demo
spec:
  replicas: 3
  selector:
    matchLabels:
      app: quota-demo
  template:
    metadata:
      labels:
        app: quota-demo
    spec:
      containers:
        - name: app
          image: nginx:1.27
          resources:
            requests:
              cpu: 150m
              memory: 128Mi
