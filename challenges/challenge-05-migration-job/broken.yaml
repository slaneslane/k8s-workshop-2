apiVersion: batch/v1
kind: Job
metadata:
  name: db-migration-broken
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migration
          image: postgres:16-alpine
          command: ["sh", "-c"]
          args: ["psql $DATABASE_URL -c 'select definitely_missing_function();'"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: flask-app-secret
                  key: DATABASE_URL
