apiVersion: v1
kind: ConfigMap
metadata:
  name: file-config
data:
  application.properties: |
    feature.flag=true
    message=hello-from-configmap-volume
---
apiVersion: v1
kind: Secret
metadata:
  name: file-secret
type: Opaque
stringData:
  password.txt: "super-secret-training-password"
---
apiVersion: v1
kind: Pod
metadata:
  name: volume-reader
spec:
  containers:
    - name: reader
      image: busybox:1.36
      command: ["sh", "-c", "sleep 3600"]
      volumeMounts:
        - name: config-volume
          mountPath: /config
        - name: secret-volume
          mountPath: /secret
          readOnly: true
  volumes:
    - name: config-volume
      configMap:
        name: file-config
    - name: secret-volume
      secret:
        secretName: file-secret
