services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: workshop
      POSTGRES_USER: workshop
      POSTGRES_PASSWORD: workshop
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  migration:
    build:
      context: ..
      dockerfile: docker/Dockerfile.migration
    environment:
      DATABASE_URL: postgresql://workshop:workshop@postgres:5432/workshop
    depends_on:
      - postgres
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile.debug
    environment:
      DATABASE_URL: postgresql://workshop:workshop@postgres:5432/workshop
      LOG_FILE: /data/events.log
    ports:
      - "8080:8080"
    volumes:
      - applogs:/data
    depends_on:
      - postgres
volumes:
  pgdata:
  applogs:
